name: Deploy FastAPI to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'model_test/model_app/**' # 오직 model_test/model_app 폴더 안의 소스가 바뀔 때만 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 소스코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 도커 허브 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 3. FastAPI 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:latest ./model_test/model_app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:latest

      # 4. EC2에 접속하여 FastAPI 컨테이너만 쏙 교체
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/model_app
            sudo docker compose pull fastapi-app
            sudo docker compose up -d fastapi-app