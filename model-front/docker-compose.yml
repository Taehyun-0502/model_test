services:
  spring:
    image: taehyun05/test:model_app-spring-app
    container_name: spring-app
    ports:
      - "8080:8080"
    restart: unless-stopped

  fastapi:
    image: taehyun05/test:model_app-fastapi-app
    container_name: fastapi-app
    ports:
      - "8000:8000"
    restart: unless-stopped

  react:
    image: taehyun05/test:model_app-react-app
    container_name: react-app
    ports:
      - "80:80"
    restart: unless-stopped